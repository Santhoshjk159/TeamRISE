# ============================================================================
# Docker Compose - Manufacturing Intelligence Engine
# ============================================================================
version: "3.9"

services:
  app:
    build: .
    container_name: manufacturing-intelligence
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./manufacturing.db
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

